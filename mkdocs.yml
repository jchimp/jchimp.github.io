site_name: Jeremy's Lab Notes
site_description: How-tos, references, notes, and project write-ups.
site_url: https://jchimp.tech

repo_name: jchimp/jchimp.github.io
repo_url: https://github.com/jchimp/jchimp.github.io
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - blog

nav:
  - Home: index.md
  - How-To:
      - Overview: how-to/README.md
      - Site Workflow: how-to/site-workflow.md
      - How-To Template: _templates/how-to-template.md
  - Projects:
      - Overview: projects/README.md
      - Zonerr: projects/zonerr.md
      - JRepo: projects/jrepo.md
      - Project Template: _templates/project-template.md
  - Notes:
      - Overview: notes/README.md
      - Capture Template: notes/capture-template.md
      - Post Template: _templates/post-template.md
  - References:
      - Overview: references/README.md
      - Image Workflow: references/image-workflow.md
      - Custom Domain and HTTPS: references/custom-domain-and-https.md
      - GitHub Actions Deployment (Later): references/github-actions-deploy.md
  - Blog:
    - blog/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - meta
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX

extra_css:
  - stylesheets/extra.css
  - stylesheets/site-theme.css
  - stylesheets/homepage.css

extra_javascript: []
