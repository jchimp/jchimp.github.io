# ============================================================================
#  zensical.toml — Jeremy's Lab Notes
#
#  Full config for Zensical static site generator
#  Replaces mkdocs.yml
#
#  Docs: https://zensical.org/docs/
# ============================================================================

# ----------------------------------------------------------------------------
#  Core project settings
# ----------------------------------------------------------------------------

[project]

site_name = "Jeremy's Lab Notes"
site_description = "How-tos, references, notes, and project write-ups."
site_author = "Jeremy Champion"
site_url = "https://jchimp.tech/"
copyright = "Copyright &copy; 2026 Jeremy Champion"

repo_name = "jchimp/jchimp.github.io"
repo_url = "https://github.com/jchimp/jchimp.github.io"

# Avoid Windows excluded port range on 8000
dev_addr = "127.0.0.1:8001"

# Custom CSS (paths relative to docs/)
extra_css = [
    "stylesheets/extra.css",
    "stylesheets/site-theme.css",
    "stylesheets/homepage.css",
]



# Custom JS (uncomment when needed)
# extra_javascript = ["javascripts/extra.js"]

# ----------------------------------------------------------------------------
#  Navigation
# ----------------------------------------------------------------------------

nav = [
    { "Home" = "index.md" },
    { "Articles" = "articles/index.md" },
    #{ "Lab" = [
    #    { "Overview"       = "lab/README.md" },
    #]},
    { "Projects" = [
        { "Overview"            = "projects/README.md" },
        { "Backup-SQLExpressDB" = "projects/backup-sqlexpressdb.md" },
        { "Zonerr"              = "projects/zonerr.md" },
        { "JRepo"               = "projects/jrepo.md" },
        { "Key-Rex"             = "projects/key-rex.md" },
        { "Town Pump Locator"   = "projects/townpump-locator.md" },
    ]},
    { "Gallery" = [
        { "Overview"            = "gallery/README.md" },
        { "Computer Hardware Chart"     = "gallery/computer-hardware-chart-2026.md" },
        { "Characters to Electrons"     = "gallery/chars-to-electrons.md" },
    ]},
    { "Links" = "links/index.md" },
    { "About" = "about.md" },
]

# ----------------------------------------------------------------------------
#  Theme
# ----------------------------------------------------------------------------

[project.theme]

# "modern" = Inter + JetBrains Mono + Lucide icons (new Zensical look)
# "classic" = Roboto + Roboto Mono (Material for MkDocs look)
variant = "modern"

language = "en"

features = [
    # Navigation
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tabs",
    "navigation.sections",
    "navigation.expand",
    "navigation.top",
    "navigation.path",

    # Search
    "search.highlight",
    "search.suggest",

    # Content
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
]

# Custom template overrides (relative to docs/)
custom_dir = "overrides"


# Fonts
[project.theme.font]
text = "Inter"
code = "JetBrains Mono"   # swap to "Mononoki" only if self-hosted; it is not on Google Fonts


# Site icon (Lucide set available by default in modern variant)
#[project.theme.icon]
#logo = "lucide/notebook-pen"
#repo = "lucide/github"

# ----------------------------------------------------------------------------
#  Color palette — dark/light toggle
# ----------------------------------------------------------------------------

# Dark mode
[[project.theme.palette]]
scheme  = "slate"
primary = "custom"
accent  = "custom"

[project.theme.palette.toggle]
icon = "lucide/sun"
name = "Switch to light mode"

# Light mode
[[project.theme.palette]]
scheme  = "default"
primary = "custom"
accent  = "custom"

[project.theme.palette.toggle]
icon = "lucide/moon"
name = "Switch to dark mode"

# ----------------------------------------------------------------------------
#  Plugins
# ----------------------------------------------------------------------------

[project.plugins.search]
enabled = true

# Uncomment if you want offline support
# [project.plugins.offline]
# enabled = true

# ----------------------------------------------------------------------------
#  Markdown extensions
# ----------------------------------------------------------------------------

# Core extensions (no config needed)
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

# PyMdown Extensions
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "pymdownx.emoji.twemoji"
emoji_generator = "pymdownx.emoji.to_svg"

# ----------------------------------------------------------------------------
#  Analytics (replace with your GA4 ID)
# ----------------------------------------------------------------------------

[project.extra.analytics]
provider = "google"
property = "G-XXXXXXXXXX"

# ----------------------------------------------------------------------------
#  Social links (footer)
# ----------------------------------------------------------------------------

[[project.extra.social]]
icon = "simple/github"
link = "https://github.com/jchimp"
name = "GitHub"

# Uncomment and add more as needed:
# [[project.extra.social]]
# icon = "lucide/mail"
# link = "mailto:you@example.com"
# name = "Email"
